{% extends 'main/layout.html'%}

{% block title %} Saytdagi yangiliklar {% endblock %}

{% block content%}
<div class="features">
    <h1> Saytdagi yangiliklar </h1>
    {% if news %}
    {% for el in news %}
        <div class="alert alert-warning">
            <h3>{{el.title}}</h3>
            <p>{{el.anons}}</p>
            <a href="{% url 'news_detail' el.id %}" class="btn btn-warning">Batafsil o'qish</a>
        </div>
    {% endfor %}
    {% else %}
        <p>Yangilik yo'q</p>
    {% endif %} 
    
    {# Comment #}
</div> 
    
{% endblock %}
